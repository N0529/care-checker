<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareCheck - Hospital Transparency Platform</title>
    <meta name="description" content="Community-driven hospital wait times and billing transparency in India.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar glass">
        <div class="nav-content">
            <div class="logo">
                <i class="ph ph-heartbeat"></i>
                <span>CareCheck</span>
            </div>
            <div class="nav-links">
                <a href="#" class="active" id="nav-hospitals">Hospitals</a>
                <a href="#" id="nav-admin">Admin Dashboard</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <!-- Patient View -->
        <div id="patient-view" class="view active">
            <header class="hero">
                <h1>Find transparent healthcare.</h1>
                <p>Real community ratings on wait times and billing clarify across India.</p>
                
                <div class="search-bar glass">
                    <i class="ph ph-magnifying-glass"></i>
                    <input type="text" id="search-input" placeholder="Search hospitals by name or address...">
                </div>
                <button id="add-hospital-btn" class="btn primary" style="margin: 0 auto 2rem; display: flex; gap: 0.5rem;"><i class="ph ph-plus-circle"></i> Add New Hospital</button>
            </header>

            <div class="main-layout">
                <div class="hospitals-list-container">
                    <div class="list-header">
                        <h2>Hospitals</h2>
                        <span id="hospital-count" class="badge">0</span>
                    </div>
                    <div id="hospitals-list" class="hospitals-list">
                        <!-- Loading skeleton -->
                        <div class="skeleton-card"></div>
                        <div class="skeleton-card"></div>
                        <div class="skeleton-card"></div>
                    </div>
                </div>
                
                <div class="map-container glass">
                    <div id="map"></div>
                </div>
            </div>
        </div>

        <!-- Admin View -->
        <div id="admin-view" class="view hidden">
            <div class="admin-header">
                <h2>Admin Dashboard</h2>
                <button id="export-csv-btn" class="btn primary">
                    <i class="ph ph-download-simple"></i> Export Data CSV
                </button>
            </div>
            
            <div class="metrics-grid">
                <div class="metric-card glass">
                    <div class="metric-icon"><i class="ph ph-buildings"></i></div>
                    <div class="metric-content">
                        <h3>Total Hospitals</h3>
                        <p id="admin-total-hospitals">0</p>
                    </div>
                </div>
                <div class="metric-card glass">
                    <div class="metric-icon"><i class="ph ph-star"></i></div>
                    <div class="metric-content">
                        <h3>Platform Avg Rating</h3>
                        <p id="admin-avg-rating">0.0</p>
                    </div>
                </div>
                <div class="metric-card glass">
                    <div class="metric-icon"><i class="ph ph-users"></i></div>
                    <div class="metric-content">
                        <h3>Total Reviews</h3>
                        <p id="admin-total-reviews">0</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Review Modal -->
    <div id="review-modal" class="modal">
        <div class="modal-content glass">
            <span class="close-modal">&times;</span>
            <h2 id="modal-hospital-name">Rate Hospital</h2>
            <form id="review-form">
                <input type="hidden" id="review-hospital-id">
                
                <div class="form-group">
                    <label>Wait Time Satisfaction</label>
                    <div class="star-rating" data-field="wait-time">
                        <i class="ph ph-star" data-value="1"></i>
                        <i class="ph ph-star" data-value="2"></i>
                        <i class="ph ph-star" data-value="3"></i>
                        <i class="ph ph-star" data-value="4"></i>
                        <i class="ph ph-star" data-value="5"></i>
                    </div>
                    <input type="hidden" id="wait-time-input" required>
                </div>
                
                <div class="form-group">
                    <label>Billing Transparency</label>
                    <div class="star-rating" data-field="billing">
                        <i class="ph ph-star" data-value="1"></i>
                        <i class="ph ph-star" data-value="2"></i>
                        <i class="ph ph-star" data-value="3"></i>
                        <i class="ph ph-star" data-value="4"></i>
                        <i class="ph ph-star" data-value="5"></i>
                    </div>
                    <input type="hidden" id="billing-input" required>
                </div>

                <div class="form-group">
                    <label for="review-text">Optional Comment</label>
                    <textarea id="review-text" rows="3" placeholder="Share your experience..."></textarea>
                </div>

                <div id="review-error" class="error-msg"></div>
                <button type="submit" class="btn primary submit-btn">Submit Review</button>
            </form>
        </div>
    </div>

    <!-- Add Hospital Modal -->
    <div id="add-hospital-modal" class="modal">
        <div class="modal-content glass">
            <span class="close-modal add-hospital-close">&times;</span>
            <h2>Add New Hospital</h2>
            <form id="add-hospital-form">
                <div class="form-group">
                    <label>Hospital Name</label>
                    <input type="text" id="add-name-input" class="modal-input" required placeholder="e.g. City General Hospital">
                </div>
                <div class="form-group">
                    <label>Address / City</label>
                    <input type="text" id="add-address-input" class="modal-input" required placeholder="e.g. Mumbai, Maharashtra">
                </div>
                <div id="add-hospital-error" class="error-msg"></div>
                <button type="submit" class="btn primary submit-btn">Find & Add</button>
            </form>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <!-- Custom JS -->
    <script src="js/app.js"></script>
</body>
</html>
